<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SENTINEL — Anomaly Detection</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #080c10;
    --panel:     #0d1117;
    --border:    #1c2a38;
    --accent:    #00e5ff;
    --warn:      #ff9800;
    --critical:  #ff1744;
    --ok:        #00e676;
    --text:      #c9d8e8;
    --dim:       #4a6070;
    --glow:      0 0 20px rgba(0,229,255,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Animated grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px; margin-bottom: 32px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px;
    border: 2px solid var(--accent);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--glow);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 10px rgba(0,229,255,0.3); }
    50%      { box-shadow: 0 0 30px rgba(0,229,255,0.7); }
  }
  .logo-icon svg { width: 20px; height: 20px; fill: var(--accent); }
  h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 4px; color: #fff; }
  h1 span { color: var(--accent); }
  .status-bar { display: flex; align-items: center; gap: 16px; }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--ok);
    animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .live-label { font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--ok); letter-spacing: 2px; }
  .last-updated { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--dim); }

  /* Summary cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
  }
  .card.accent::before  { background: var(--accent); }
  .card.warn::before    { background: var(--warn); }
  .card.critical::before{ background: var(--critical); }
  .card.ok::before      { background: var(--ok); }
  .card:hover { border-color: var(--accent); }
  .card-label { font-size: 0.7rem; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; }
  .card-value { font-size: 2.2rem; font-weight: 700; line-height: 1; }
  .card.accent  .card-value { color: var(--accent); }
  .card.warn    .card-value { color: var(--warn); }
  .card.critical.card-value { color: var(--critical); }
  .card.ok      .card-value { color: var(--ok); }
  .card-sub { font-size: 0.75rem; color: var(--dim); margin-top: 4px; }

  /* Grid layout */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media(max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  /* Panels */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,229,255,0.03);
  }
  .panel-title { font-size: 0.75rem; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; font-weight: 700; }
  .panel-count { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--dim); }
  .panel-body { padding: 16px 20px; max-height: 360px; overflow-y: auto; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Anomaly rows */
  .anomaly-row {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    margin-bottom: 10px;
    transition: border-color 0.2s, background 0.2s;
    cursor: default;
  }
  .anomaly-row:hover { border-color: var(--accent); background: rgba(0,229,255,0.03); }
  .anomaly-row:last-child { margin-bottom: 0; }
  .anom-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem; letter-spacing: 1px;
    padding: 2px 8px; border-radius: 2px;
    font-weight: 700;
  }
  .badge.CRITICAL { background: rgba(255,23,68,0.2); color: var(--critical); border: 1px solid var(--critical); }
  .badge.HIGH     { background: rgba(255,152,0,0.2);  color: var(--warn);     border: 1px solid var(--warn); }
  .badge.MEDIUM   { background: rgba(0,229,255,0.1);  color: var(--accent);   border: 1px solid var(--accent); }
  .sensor-tag {
    font-family: 'Share Tech Mono', monospace; font-size: 0.7rem;
    color: #fff; background: rgba(255,255,255,0.07);
    padding: 2px 8px; border-radius: 2px;
  }
  .metric-tag { font-size: 0.7rem; color: var(--dim); }
  .anom-values {
    display: flex; gap: 16px; margin-bottom: 8px;
    font-family: 'Share Tech Mono', monospace; font-size: 0.72rem;
  }
  .anom-val span { color: var(--dim); }
  .anom-val.z { color: var(--warn); }
  .anom-explain { font-size: 0.82rem; color: var(--text); line-height: 1.5; opacity: 0.85; }
  .anom-time { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--dim); margin-top: 6px; }

  /* Sensor readings table */
  .sensor-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .sensor-table th {
    text-align: left; padding: 8px 10px;
    font-size: 0.65rem; letter-spacing: 2px; color: var(--dim);
    border-bottom: 1px solid var(--border); text-transform: uppercase;
  }
  .sensor-table td { padding: 10px 10px; border-bottom: 1px solid rgba(28,42,56,0.5); }
  .sensor-table tr:last-child td { border-bottom: none; }
  .sensor-table tr:hover td { background: rgba(0,229,255,0.03); }
  .mono { font-family: 'Share Tech Mono', monospace; }

  /* Sensor bar chart */
  .bar-wrap { margin-bottom: 12px; }
  .bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.8rem; }
  .bar-bg { background: var(--border); border-radius: 2px; height: 6px; }
  .bar-fill { height: 6px; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--warn)); transition: width 0.8s ease; }

  /* Empty state */
  .empty { text-align: center; padding: 40px 20px; color: var(--dim); }
  .empty p { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; margin-top: 8px; }

  /* Loading */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-center { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 40px; color: var(--dim); font-size: 0.8rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <h1>SENTI<span>NEL</span></h1>
        <div style="font-size:0.7rem;color:var(--dim);letter-spacing:2px">AI ANOMALY DETECTION SYSTEM</div>
      </div>
    </div>
    <div class="status-bar">
      <div class="live-dot"></div>
      <div class="live-label">LIVE</div>
      <div class="last-updated" id="lastUpdated">—</div>
    </div>
  </header>

  <!-- Summary cards -->
  <div class="cards" id="cards">
    <div class="card accent"><div class="card-label">Total Anomalies (24h)</div><div class="card-value" id="c-total">—</div></div>
    <div class="card critical"><div class="card-label">Critical</div><div class="card-value" id="c-critical">—</div></div>
    <div class="card warn"><div class="card-label">High</div><div class="card-value" id="c-high">—</div></div>
    <div class="card ok"><div class="card-label">Sensors Affected</div><div class="card-value" id="c-sensors">—</div></div>
  </div>

  <div class="grid">
    <!-- Anomaly feed -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">⚠ Anomaly Feed</div>
        <div class="panel-count" id="anom-count">Loading…</div>
      </div>
      <div class="panel-body" id="anomaly-list">
        <div class="loading-center"><div class="spinner"></div> Fetching anomalies…</div>
      </div>
    </div>

    <!-- Right column -->
    <div style="display:flex;flex-direction:column;gap:20px">
      <!-- Sensor activity -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">⬡ Sensor Activity</div>
          <div class="panel-count" id="sensor-count">—</div>
        </div>
        <div class="panel-body" id="sensor-bars">
          <div class="loading-center"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Live readings -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">◈ Live Readings</div>
        </div>
        <div class="panel-body" style="padding:0">
          <table class="sensor-table">
            <thead>
              <tr>
                <th>Sensor</th><th>Temp °C</th><th>Humidity %</th><th>Wind m/s</th><th>Press hPa</th>
              </tr>
            </thead>
            <tbody id="readings-body">
              <tr><td colspan="5"><div class="loading-center"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────
  // Replace with your actual Cloud Run dashboard service URL after deploy
  const API_BASE = window.location.origin;
  const REFRESH_MS = 30000;

  // ── Helpers ──────────────────────────────────────────────
  function fmt(v, dec = 1) {
    return v == null ? '—' : Number(v).toFixed(dec);
  }
  function relTime(iso) {
    const d = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (d < 60)  return `${d}s ago`;
    if (d < 3600) return `${Math.floor(d/60)}m ago`;
    return `${Math.floor(d/3600)}h ago`;
  }
  async function get(path) {
    const r = await fetch(API_BASE + path);
    return r.json();
  }

  // ── Render functions ──────────────────────────────────────
  function renderSummary(s) {
    document.getElementById('c-total').textContent    = s.total_anomalies ?? '—';
    document.getElementById('c-critical').textContent = s.critical ?? '—';
    document.getElementById('c-high').textContent     = s.high ?? '—';
    document.getElementById('c-sensors').textContent  = s.sensors_affected ?? '—';
  }

  function renderAnomalies(rows) {
    const el = document.getElementById('anomaly-list');
    document.getElementById('anom-count').textContent = rows.length + ' events';
    if (!rows.length) {
      el.innerHTML = `<div class="empty">
        <div style="font-size:2rem">✓</div>
        <p>No anomalies detected in last 24h</p>
      </div>`;
      return;
    }
    el.innerHTML = rows.map(r => `
      <div class="anomaly-row">
        <div class="anom-top">
          <span class="badge ${r.severity}">${r.severity}</span>
          <span class="sensor-tag">${r.sensor_id}</span>
          <span class="metric-tag">${r.metric.toUpperCase()}</span>
        </div>
        <div class="anom-values">
          <div class="anom-val"><span>value </span>${fmt(r.value, 2)}</div>
          <div class="anom-val"><span>mean </span>${fmt(r.mean, 2)}</div>
          <div class="anom-val"><span>σ </span>${fmt(r.std_dev, 2)}</div>
          <div class="anom-val z"><span>z </span>${fmt(r.z_score, 2)}</div>
        </div>
        <div class="anom-explain">${r.ai_explanation || ''}</div>
        <div class="anom-time">${r.detected_at ? relTime(r.detected_at) : ''}</div>
      </div>
    `).join('');
  }

  function renderSensorBars(rows) {
    const el = document.getElementById('sensor-bars');
    document.getElementById('sensor-count').textContent = rows.length + ' sensors';
    if (!rows.length) {
      el.innerHTML = '<div class="empty"><p>No data yet</p></div>';
      return;
    }
    const max = Math.max(...rows.map(r => r.anomaly_count));
    el.innerHTML = rows.map(r => `
      <div class="bar-wrap">
        <div class="bar-label">
          <span>${r.sensor_id}</span>
          <span class="mono">${r.anomaly_count} anomalies</span>
        </div>
        <div class="bar-bg">
          <div class="bar-fill" style="width:${max ? (r.anomaly_count/max*100) : 0}%"></div>
        </div>
      </div>
    `).join('');
  }

  function renderReadings(rows) {
    const tb = document.getElementById('readings-body');
    if (!rows.length) {
      tb.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--dim);padding:20px">No readings yet</td></tr>';
      return;
    }
    tb.innerHTML = rows.map(r => `
      <tr>
        <td><span class="sensor-tag">${r.sensor_id}</span></td>
        <td class="mono">${fmt(r.temperature)}</td>
        <td class="mono">${fmt(r.humidity)}</td>
        <td class="mono">${fmt(r.wind_speed)}</td>
        <td class="mono">${fmt(r.pressure, 0)}</td>
      </tr>
    `).join('');
  }

  // ── Main refresh ──────────────────────────────────────────
  async function refresh() {
    try {
      const [summary, anomalies, bySensor, readings] = await Promise.all([
        get('/api/stats/summary'),
        get('/api/anomalies/recent'),
        get('/api/stats/by_sensor'),
        get('/api/readings/latest'),
      ]);
      renderSummary(summary);
      renderAnomalies(anomalies);
      renderSensorBars(bySensor);
      renderReadings(readings);
      document.getElementById('lastUpdated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    } catch (e) {
      console.error(e);
      document.getElementById('lastUpdated').textContent = 'Connection error';
    }
  }

  refresh();
  setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
